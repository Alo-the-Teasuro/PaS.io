name: Update market data

on:
  schedule:
    - cron: "17 11 * * *"   # daily at 11:17 UTC (change to whatever you like)
  workflow_dispatch: {}       # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write             # lets the job commit the refreshed data back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit changes
        run: |
          git config user.name "pas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "Update market data ($(date -u +%Y-%m-%d))"
          git push
